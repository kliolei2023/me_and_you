<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>心動航線：從遠方到身邊</title>
    <style>
        :root {
            --bg-dark: #0a0a1a;
            --bg-light: #1a1a3a;
            --card-back-bg: linear-gradient(135deg, #111122 0%, #2a1b4d 100%);
            --lv1-glow: rgba(135, 206, 250, 0.6);
            --lv1-bg: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            --lv2-glow: rgba(255, 165, 0, 0.6);
            --lv2-bg: linear-gradient(135deg, #ffedd5 0%, #fed7aa 100%);
            --lv3-glow: rgba(220, 20, 60, 0.8);
            --lv3-bg: linear-gradient(135deg, #ffe4e6 0%, #fecdd3 100%);
        }
        
        * { box-sizing: border-box; font-family: 'PingFang TC', 'Microsoft JhengHei', serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-dark) 100%);
            color: #fff; overflow: hidden; display: flex; flex-direction: column; height: 100vh;
            transition: background 0.5s ease;
        }

        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        
        /* 模式選擇畫面 */
        #setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; z-index: 200; position: absolute; background: inherit; text-align: center; padding: 20px; overflow-y: auto;}
        .setup-title { font-size: 32px; color: #f8e5b4; margin-bottom: 5px; font-weight: 300; letter-spacing: 2px;}
        .setup-subtitle { font-size: 16px; color: #aaa; margin-bottom: 20px; }
        .file-input-wrapper { margin-bottom: 25px; padding: 15px; width: 90%; max-width: 400px; }
        
        .mode-btn-container { display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 400px; }
        .mode-btn {
            padding: 15px 20px; font-size: 18px; border: 1px solid rgba(248, 229, 180, 0.5); border-radius: 15px;
            background: rgba(0,0,0,0.3); color: #f8e5b4; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .mode-btn span { font-size: 12px; color: #ccc; margin-top: 5px; font-weight: normal;}
        .mode-btn:hover, .mode-btn:active { background: rgba(248, 229, 180, 0.2); box-shadow: 0 0 15px rgba(248, 229, 180, 0.3); }

        /* 遊戲主畫面 */
        #game-screen { display: none; height: 100vh; width: 100vw; position: relative; }
        
        #status-bar { position: absolute; top: max(20px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); padding: 10px 25px; font-size: 14px; letter-spacing: 1px; color: #ddd; z-index: 10; white-space: nowrap; }

        /* 心動蓄力條 */
        #progress-container {
            display: none; position: absolute; top: max(75px, calc(env(safe-area-inset-top) + 60px)); left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 400px; height: 20px; background: rgba(255,255,255,0.1); border-radius: 10px; z-index: 10;
            border: 1px solid rgba(255,255,255,0.2); overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #ffedd5, #be123c); transition: width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 0 15px #be123c; }
        #progress-text { position: absolute; top: -25px; width: 100%; text-align: center; font-size: 14px; color: #ffedd5; font-weight: bold; letter-spacing: 1px;}
        
        /* 牌堆區 */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        #deck-container { flex: 1; display: flex; align-items: center; justify-content: center; height: 80vh; cursor: pointer; animation: float 4s ease-in-out infinite; gap: 15px; flex-wrap: wrap; padding: 0 20px;}
        
        .deck-visual {
            width: 45vw; max-width: 240px; aspect-ratio: 2 / 3; border-radius: 15px;
            border: 6px solid #e0e0e0; box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.8);
            background: var(--card-back-bg); background-size: cover; background-position: center;
            position: relative; transition: transform 0.2s; display: flex; justify-content: center; align-items: center;
        }
        .deck-lv1 { border-color: #bae6fd; box-shadow: 0 10px 25px rgba(135, 206, 250, 0.4); }
        .deck-lv2 { border-color: #fed7aa; box-shadow: 0 10px 25px rgba(255, 165, 0, 0.4); }
        .deck-lv3 { border-color: #fecdd3; box-shadow: 0 10px 25px rgba(220, 20, 60, 0.4); }
        .deck-label { background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 18px; pointer-events: none;}

        .deck-visual::after, .deck-visual::before { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 15px; background-size: cover; background-position: center; pointer-events: none;}
        .deck-visual::after { top: 4px; left: 4px; border: 2px solid rgba(255,255,255,0.3); background: inherit; z-index: -1; }
        .deck-visual::before { top: 8px; left: 8px; border: 1px solid rgba(255,255,255,0.2); background: inherit; z-index: -2; }
        .deck-visual:active { transform: scale(0.95); }
        .click-hint { position: absolute; bottom: -45px; width: 100%; text-align: center; color: #aaa; font-size: 15px; letter-spacing: 2px; pointer-events: none;}

        #controls { position: absolute; bottom: 0; width: 100%; padding-bottom: max(20px, env(safe-area-inset-bottom)); display: flex; justify-content: center; z-index: 10; gap: 15px; }
        #controls button { padding: 12px 24px; font-size: 16px; border: 1px solid #555; border-radius: 30px; background: transparent; color: #888; cursor: pointer;}

        /* 全螢幕覆蓋區 (炸彈特效) */
        .fullscreen-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 100; justify-content: center; align-items: center; flex-direction: column; overflow-y: auto;}
        @keyframes alertFlash { 0% { background: rgba(180, 0, 0, 0.6); } 50% { background: rgba(0, 0, 0, 0.9); } 100% { background: rgba(180, 0, 0, 0.6); } }
        .bomb-alert { animation: alertFlash 1.5s infinite !important; }
        .overlay-hint { color: rgba(255,255,255,0.8); font-size: 16px; letter-spacing: 2px; margin-top: 15px; margin-bottom: 20px;}
        .close-btn { display: none; margin-top: 20px; margin-bottom: max(40px, env(safe-area-inset-bottom)); padding: 16px 40px; font-size: 18px; border-radius: 30px; background: #f8e5b4; color: #0a0a1a; font-weight: bold; border: none; box-shadow: 0 4px 15px rgba(248, 229, 180, 0.3); cursor: pointer; z-index: 101;}

        /* 卡片共用樣式 */
        .cards-layout { display: flex; flex-direction: row; gap: 15px; align-items: center; justify-content: center; padding: 20px; width: 100%;}
        .card-wrapper { width: 80vw; max-width: 320px; aspect-ratio: 2.2 / 3.5; perspective: 1500px; cursor: pointer; flex-shrink: 0;}
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .card-wrapper.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; border: 8px solid #fdfdfd; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .card-back { background: var(--card-back-bg); background-size: cover; background-position: center; box-shadow: 0 10px 40px rgba(255,255,255,0.1); }
        .card-front { transform: rotateY(180deg); color: #222; }
        
        .card-level { font-size: 13px; font-weight: bold; margin-bottom: 15px; padding: 5px 15px; border-radius: 20px; letter-spacing: 1px;}
        .card-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; text-align: center;}
        .card-text { font-size: 16px; line-height: 1.6; text-align: left; font-weight: 600;}
        
        .lv1-front { background: var(--lv1-bg); box-shadow: 0 0 30px var(--lv1-glow); }
        .lv2-front { background: var(--lv2-bg); box-shadow: 0 0 30px var(--lv2-glow); }
        .lv3-front { background: var(--lv3-bg); box-shadow: 0 0 30px var(--lv3-glow); }
        .lv1-text { color: #0284c7; background: rgba(255,255,255,0.8); }
        .lv2-text { color: #c2410c; background: rgba(255,255,255,0.8); }
        .lv3-text { color: #be123c; background: rgba(255,255,255,0.8); }

        /* 手機版雙卡上下排列 */
        @media (max-width: 767px) {
            .cards-layout.dual-mode { flex-direction: column; gap: 25px; padding-top: 40px; }
            .dual-mode .card-wrapper { aspect-ratio: auto; height: 350px; }
        }

        @media (min-width: 768px) {
            .setup-title { font-size: 48px; }
            .setup-subtitle { font-size: 20px; }
            .deck-visual { max-width: 300px; }
            .click-hint { font-size: 20px; bottom: -60px; }
            .card-wrapper { max-width: 380px; }
            .card-title { font-size: 26px; margin-bottom: 25px;}
            .card-text { font-size: 20px; line-height: 1.8; }
            .card-level { font-size: 16px; padding: 8px 20px;}
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-title">丫頭 & 獅子</div>
        <div class="setup-subtitle">專屬心動航線</div>
        
        <div class="file-input-wrapper glass-panel">
            <label for="bg-upload" id="upload-label" style="cursor:pointer; color:#f8e5b4; display:block;">
                <div style="font-size: 30px; margin-bottom: 10px;">📸</div>
                點擊上傳合照作專屬卡背<br><span style="font-size: 12px; color:#aaa; display:block; margin-top:5px;">(若無上傳將使用午夜星空背景)</span>
            </label>
            <input type="file" id="bg-upload" accept="image/*" style="display:none" onchange="previewImage(event)">
        </div>

        <div class="mode-btn-container">
            <div class="mode-btn" onclick="startGame(1)">🌌 星空漫遊 <span>104張牌全打亂，把驚喜交給命運</span></div>
            <div class="mode-btn" onclick="startGame(2)">🌡️ 循序升溫 <span>分3堆等級自選，氣氛由你們掌控</span></div>
            <div class="mode-btn" style="border-color: #fecdd3; color: #fecdd3;" onclick="startGame(3)">💣 心跳炸彈 <span>蓄力條隨機暴增，引爆雙重刺激任務！</span></div>
        </div>
    </div>

    <div id="game-screen">
        <div id="status-bar" class="glass-panel">
            已探索: <span id="drawn-count" style="color:#f8e5b4; font-weight:bold; font-size:18px;">0</span> / 剩餘: <span id="remain-count">104</span>
        </div>

        <div id="progress-container">
            <div id="progress-text">危險臨界值 0%</div>
            <div id="progress-fill"></div>
        </div>

        <div id="deck-container"></div>

        <div id="controls">
            <button onclick="location.reload()">重新選擇模式</button>
            <button onclick="resetGame()" style="border-color: #555; color: #888;">重新洗牌</button>
        </div>
    </div>

    <div id="fullscreen-overlay" class="fullscreen-overlay">
        <div id="overlay-title" style="color:#fecdd3; font-size:24px; font-weight:bold; display:none; margin-top:20px;">⚠️ 心跳炸彈引爆！必須完成雙重任務 ⚠️</div>
        
        <div class="cards-layout" id="cards-layout-container">
            <div class="card-wrapper" id="card1-wrapper" onclick="flipCard('card1')">
                <div class="card-inner">
                    <div class="card-back" id="card1-back"></div>
                    <div class="card-front" id="card1-front">
                        <div class="card-level" id="card1-lv">Level</div>
                        <div class="card-title" id="card1-title">標題</div>
                        <div class="card-text" id="card1-desc">內容</div>
                    </div>
                </div>
            </div>
            
            <div class="card-wrapper" id="card2-wrapper" onclick="flipCard('card2')" style="display:none;">
                <div class="card-inner">
                    <div class="card-back" id="card2-back"></div>
                    <div class="card-front" id="card2-front">
                        <div class="card-level" id="card2-lv">Level</div>
                        <div class="card-title" id="card2-title">標題</div>
                        <div class="card-text" id="card2-desc">內容</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="overlay-hint" id="overlay-hint">輕觸卡牌 翻開心跳</div>
        <button class="close-btn" onclick="closeFullscreen()" id="next-btn">任務完成 / 收起卡片</button>
    </div>

<script>
    // 使用你提供的 104 張卡片，已修復逗號，並完善了結束條件！
    const allCards = [
        { lv: 1, title: '【行動任務｜黑歷史朗讀】', text: '請翻出我曖昧期說過最客套的一句話，用戲劇化語氣唸給我聽。唸完即可。' },
        { lv: 1, title: '【真心話｜未來預見】', text: '我想知道，如果可以預見未來，你最想看到我們一年後的什麼畫面？' },
        { lv: 1, title: '【行動任務｜十指緊扣】', text: '請和我十指緊扣 1 分鐘，並告訴我一個你的小秘密。1分鐘後才能放開喔。' },
        { lv: 1, title: '【真心話｜初見重溫】', text: '請閉上眼，詳細形容今天見到我第一眼時，我的穿搭與表情。' },
        { lv: 1, title: '【行動任務｜氣音耳語】', text: '請靠在我的耳邊，用氣音告訴我，我身上最吸引你的特質是什麼。' },
        { lv: 1, title: '【真心話｜回憶定格】', text: '遠距離時，哪一個瞬間讓你最想立刻飛到我身邊？' },
        { lv: 1, title: '【行動任務｜掌心傳溫】', text: '請把手心貼著我的手心，我們一起閉上眼，安靜感受彼此的體溫 1 分鐘。' },
        { lv: 1, title: '【行動任務｜彩虹屁大賽】', text: '請跟我輪流說出對方的三個優點，先詞窮的人要被彈額頭喔！' },
        { lv: 1, title: '【真心話｜默契考驗】', text: '我們一起數到三，同時說出我最愛的飲料，如果你答錯了，請親我的臉頰一下。' },
        { lv: 1, title: '【真心話｜浪漫時刻】', text: '你覺得在我們這段關係中，最浪漫的一刻是什麼？' },
        { lv: 1, title: '【真心話｜未來機票】', text: '如果明天能一起出國，你最想帶我去哪裡？為什麼？' },
        { lv: 1, title: '【行動任務｜專屬情歌】', text: '請放一首會讓你想到我的歌，我們一起聽完這首歌的副歌即可。' },
        { lv: 1, title: '【行動任務｜手背印記】', text: '請在我的手背上輕輕落下一吻。' },
        { lv: 1, title: '【真心話｜靈魂拷問】', text: '如果人生重來，你還是會選擇與我相遇嗎？' },
        { lv: 1, title: '【行動任務｜臉部觀察】', text: '請近距離盯著我的眼睛 30 秒，然後說出你發現了什麼細節。' },
        { lv: 1, title: '【行動任務｜摸頭安撫】', text: '請溫柔地揉揉我的頭髮 20 秒，並給我一個微笑。' },
        { lv: 1, title: '【真心話｜專屬稱呼】', text: '你最喜歡怎麼稱呼我？現在就用那個稱呼叫我一聲吧。' },
        { lv: 1, title: '【行動任務｜氣味初探】', text: '請靠近我的肩膀，深呼吸聞一下我身上的味道，並告訴我你的感覺。' },
        { lv: 1, title: '【行動任務｜演技大考驗】', text: '請模仿我視訊時「最常做的一個動作」或「最呆的表情」，如果我不滿意，你要重演一次！' },
        { lv: 1, title: '【真心話｜夢境分享】', text: '請跟我分享一個你曾經夢見過我的場景。' },
        { lv: 1, title: '【行動任務｜小默契】', text: '我們不說話，數到三用手勢比出同一個數字（1-5），看看有沒有默契。' },
        { lv: 1, title: '【真心話｜真實心聲】', text: '告訴我，你今天出門見我前，最緊張的一個念頭是什麼？' },

        { lv: 1, title: '【真心話｜家的定義】', text: '對你來說，「家」的感覺是什麼？' },

        { lv: 2, title: '【行動任務｜人體沙發】', text: '請讓我坐在你的腿上（或你坐在我腿上），直到下一張任務牌被抽出。' },

        { lv: 2, title: '【行動任務｜指尖素描】', text: '請用指尖輕輕描畫我五官的輪廓，畫完一整圈。' },
        { lv: 2, title: '【行動任務｜背後擁抱】', text: '請從背後緊緊環抱我，將下巴靠在我的肩膀上 30 秒。' },
        { lv: 2, title: '【行動任務｜鼻尖磨蹭】', text: '請將你的額頭貼著我的額頭，輕輕磨蹭彼此的鼻尖，直到我喊停。' },
        { lv: 2, title: '【行動任務｜盲測餵食】', text: '請讓我閉上眼，然後餵我吃一口零食，讓我猜是什麼。' },
        { lv: 2, title: '【行動任務｜體溫分享】', text: '請將你的雙手伸進我的口袋（或外套內）取暖 30 秒。' },
        { lv: 2, title: '【行動任務｜膝枕時光】', text: '請讓我躺在你的腿上，並輕輕梳理我的頭髮 1 分鐘。' },
        { lv: 2, title: '【行動任務｜腰間環繞】', text: '請雙手環住我的腰，將頭埋進我的懷裡，安靜擁抱 1 分鐘。' },
        { lv: 2, title: '【行動任務｜親吻連線】', text: '請從我的手心、手腕，一路親吻到我的手肘。' },

        { lv: 3, title: '【終極願望｜盲測親吻】', text: '請蒙住你的眼，讓我親吻你，你要猜出我親了哪裡。' },
        { lv: 3, title: '【私密大哉問｜害羞幻想】', text: '遠距離時，你對我的什麼幻想最讓你害羞？請誠實告訴我。' },

        { lv: 3, title: '【終極願望｜呼吸交換】', text: '親吻前，請讓我們的嘴唇微張但不碰觸，交換彼此的呼吸 10 秒。' },
        { lv: 3, title: '【終極願望｜背部游走】', text: '請將雙手伸進我的衣服裡，輕撫我的背部 30 秒。' },
        { lv: 3, title: '【私密大哉問｜曲線探索】', text: '誠實告訴我，你最喜歡我身上哪個部位的曲線？' },
        { lv: 3, title: '【終極願望｜腰線輕撫】', text: '請將雙手沿著我的腰線，慢慢上下游走 20 秒。' },
        { lv: 3, title: '【終極願望｜敏感搜尋】', text: '請找出我身上最怕癢或最敏感的一個點，並親吻它。' },
        { lv: 3, title: '【終極願望｜咬唇挑逗】', text: '在我們下次親吻的過程中，請輕輕咬一下我的下唇。' },
        { lv: 3, title: '【終極願望｜換裝遊戲】', text: '請指定我換上（或脫下）一件衣物。' },

        { lv: 3, title: '【終極願望｜身體素描】', text: '請用嘴唇當畫筆，在我的胸口或脖子上畫一個愛心。' },
        { lv: 3, title: '【終極願望｜低音誘惑】', text: '請用最沙啞性感的聲音，在我的耳邊叫我的名字。' },
        { lv: 3, title: '【終極願望｜腿部探索】', text: '請將手放在我的大腿上，慢慢向上輕撫。' },
        { lv: 3, title: '【終極願望｜吻的延伸】', text: '請從我的嘴角開始，一路親吻到我的鎖骨。' },
        { lv: 3, title: '【終極願望｜解鎖挑戰】', text: '請你完全不使用雙手（只能用嘴唇、下巴或鼻子），幫我脫掉一件配件。' },
        { lv: 3, title: '【私密大哉問｜坦白局】', text: '請誠實告訴我：在我們遠距離的時候，你對我做過最「不純潔」的幻想是什麼情境？' },
        { lv: 3, title: '【終極願望｜危險視角】', text: '請讓我平躺在床上或沙發上，然後你雙手撐在我頭部兩側，從上方俯視著我，維持 15 秒。' },
        { lv: 3, title: '【終極願望｜主控權交出】', text: '我現在宣告放棄抵抗，由你決定接下來 5 分鐘要對我做什麼。' },
        { lv: 3, title: '【終極願望｜氣息捕捉】', text: '請將頭埋在我的胸口，聽聽我因為你而加速的心跳 20 秒。' },
        { lv: 3, title: '【私密大哉問｜大尺度秘密】', text: '說出一個你在我們視訊時，曾經想過但不敢說的親密要求。' },
        { lv: 3, title: '【終極願望｜身體紀念】', text: '請在我身上找一個你最愛的位子，留下一個紅印。' },
        { lv: 3, title: '【終極願望｜氣息掠奪】', text: '請將我逼退到牆角（或沙發邊緣），靠近到幾乎要親上的距離，但不准真的碰到我，維持 20 秒。' },
        { lv: 3, title: '【終極願望｜最終選擇】', text: '請現在就帶我去臥室，終止這場遊戲；或者，你可以選擇再抽一張繼續冒險。' }
    ];

    // 系統變數
    let currentMode = 1;
    let mainDeck = [];
    let lv1Deck = [], lv2Deck = [], lv3Deck = [];
    let drawnCount = 0;
    let isOverlayOpen = false;
    let card1Flipped = false, card2Flipped = false;
    let bombProgress = 0;
    let isBombTriggered = false;

    // 上傳照片
    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.documentElement.style.setProperty('--card-back-bg', `url('${e.target.result}')`);
                document.getElementById('upload-label').innerHTML = `<div style="font-size: 35px; margin-bottom: 10px;">💖</div>專屬照片已載入！<br><span style="font-size: 12px; color:#aaa; margin-top:5px; display:block;">(點擊可重新上傳)</span>`;
            }
            reader.readAsDataURL(file);
        }
    }

    // 初始化牌堆
    function initializeDecks() {
        const shuffle = arr => arr.sort(() => Math.random() - 0.5);
        mainDeck = shuffle([...allCards]);
        lv1Deck = shuffle(allCards.filter(c => c.lv === 1));
        lv2Deck = shuffle(allCards.filter(c => c.lv === 2));
        lv3Deck = shuffle(allCards.filter(c => c.lv === 3));
        
        if (currentMode === 3) {
            mainDeck = shuffle(allCards.filter(c => c.lv === 1 || c.lv === 2));
        }
        drawnCount = 0;
        bombProgress = 0;
    }

    function startGame(mode) {
        currentMode = mode;
        initializeDecks();
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        const container = document.getElementById('deck-container');
        const progressUI = document.getElementById('progress-container');
        
        if (mode === 1) {
            progressUI.style.display = 'none';
            container.innerHTML = `<div class="deck-visual" onclick="drawMode1()"><div class="click-hint">點擊抽卡</div></div>`;
        } else if (mode === 2) {
            progressUI.style.display = 'none';
            container.innerHTML = `
                <div class="deck-visual deck-lv1" onclick="drawMode2(1)"><div class="deck-label" style="color:#bae6fd;">LEVEL 1</div></div>
                <div class="deck-visual deck-lv2" onclick="drawMode2(2)"><div class="deck-label" style="color:#fed7aa;">LEVEL 2</div></div>
                <div class="deck-visual deck-lv3" onclick="drawMode2(3)"><div class="deck-label" style="color:#fecdd3;">LEVEL 3</div></div>
            `;
        } else if (mode === 3) {
            progressUI.style.display = 'block';
            updateProgressBar();
            container.innerHTML = `<div class="deck-visual" onclick="drawMode3()"><div class="click-hint">點擊抽卡</div></div>`;
        }
        updateStats();
    }

    function updateStats() {
        document.getElementById('drawn-count').innerText = drawnCount;
        let remain = currentMode === 2 ? (lv1Deck.length + lv2Deck.length + lv3Deck.length) : mainDeck.length;
        document.getElementById('remain-count').innerText = remain;
    }

    // --- 抽卡邏輯 ---
    function drawMode1() {
        if (mainDeck.length === 0) return alert('卡牌已抽完！');
        showCards([mainDeck.pop()]);
    }

    function drawMode2(level) {
        let deck = level === 1 ? lv1Deck : level === 2 ? lv2Deck : lv3Deck;
        if (deck.length === 0) return alert(`Level ${level} 的卡牌已經被抽完囉！`);
        showCards([deck.pop()]);
    }

    function drawMode3() {
        if (mainDeck.length === 0) return alert('一般卡牌已抽完，請重新洗牌！');
        if (isOverlayOpen) return;
        
        const normalCard = mainDeck.pop();
        let increment = 0;
        let isInstantKill = Math.random() < 0.05;

        if (isInstantKill) increment = 100;
        else if (bombProgress < 50) increment = Math.floor(Math.random() * 50) + 20;
        else if (bombProgress < 85) increment = Math.floor(Math.random() * 20) + 10;
        else increment = Math.floor(Math.random() * 10) + 1;

        bombProgress += increment;
        if (bombProgress >= 100) {
            bombProgress = 100;
            isBombTriggered = true;
        }

        updateProgressBar();
        isOverlayOpen = true;
        
        setTimeout(() => {
            if (isBombTriggered) {
                const bombCard = lv3Deck.length > 0 ? lv3Deck.pop() : { lv:3, title:'【終極懲罰】', text:'深情擁吻對方 60 秒！' };
                showCards([normalCard, bombCard], true);
                bombProgress = 0;
                setTimeout(updateProgressBar, 1000);
            } else {
                showCards([normalCard]);
            }
        }, 800);
    }

    function updateProgressBar() {
        document.getElementById('progress-fill').style.width = bombProgress + '%';
        document.getElementById('progress-text').innerText = `危險臨界值 ${bombProgress}%`;
        document.getElementById('progress-text').style.color = bombProgress >= 80 ? '#be123c' : '#ffedd5';
        if(bombProgress >= 80 && bombProgress < 100) {
            document.getElementById('progress-container').style.boxShadow = '0 0 20px #be123c';
        } else {
            document.getElementById('progress-container').style.boxShadow = '0 0 10px rgba(0,0,0,0.5)';
        }
    }

    function showCards(cardsArray, isBomb = false) {
        if (!isOverlayOpen) isOverlayOpen = true;
        drawnCount += cardsArray.length;
        
        const overlay = document.getElementById('fullscreen-overlay');
        const layout = document.getElementById('cards-layout-container');
        const nextBtn = document.getElementById('next-btn');
        const titleAlert = document.getElementById('overlay-title');
        
        card1Flipped = false; card2Flipped = false;
        document.getElementById('card1-wrapper').classList.remove('flipped');
        document.getElementById('card2-wrapper').classList.remove('flipped');
        document.querySelector('#card1-wrapper .card-inner').style.transition = 'none';
        document.querySelector('#card2-wrapper .card-inner').style.transition = 'none';
        nextBtn.style.display = 'none';
        
        bindCardData(1, cardsArray[0]);

        if (cardsArray.length === 2) {
            bindCardData(2, cardsArray[1]);
            document.getElementById('card2-wrapper').style.display = 'block';
            layout.classList.add('dual-mode');
            if(isBomb) {
                overlay.classList.add('bomb-alert');
                titleAlert.style.display = 'block';
            }
        } else {
            document.getElementById('card2-wrapper').style.display = 'none';
            layout.classList.remove('dual-mode');
            overlay.classList.remove('bomb-alert');
            titleAlert.style.display = 'none';
        }

        document.getElementById('overlay-hint').style.display = 'block';

        setTimeout(() => {
            document.querySelector('#card1-wrapper .card-inner').style.transition = 'transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            document.querySelector('#card2-wrapper .card-inner').style.transition = 'transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            overlay.style.display = 'flex';
        }, 50);
    }

    function bindCardData(index, cardData) {
        const frontElem = document.getElementById(`card${index}-front`);
        const lvText = document.getElementById(`card${index}-lv`);
        frontElem.className = 'card-front'; 
        lvText.className = 'card-level';
        frontElem.classList.add(`lv${cardData.lv}-front`);
        lvText.classList.add(`lv${cardData.lv}-text`);
        lvText.innerText = `LEVEL ${cardData.lv}`;
        document.getElementById(`card${index}-title`).innerText = cardData.title;
        document.getElementById(`card${index}-desc`).innerText = cardData.text;
    }

    function flipCard(cardId) {
        document.getElementById('overlay-hint').style.display = 'none';
        
        if (cardId === 'card1' && !card1Flipped) {
            document.getElementById('card1-wrapper').classList.add('flipped');
            card1Flipped = true;
        } else if (cardId === 'card2' && !card2Flipped) {
            document.getElementById('card2-wrapper').classList.add('flipped');
            card2Flipped = true;
        }

        const isDual = document.getElementById('card2-wrapper').style.display === 'block';
        if ((!isDual && card1Flipped) || (isDual && card1Flipped && card2Flipped)) {
            setTimeout(() => {
                document.getElementById('next-btn').style.display = 'block';
            }, 800);
        }
    }

    function closeFullscreen() {
        const overlay = document.getElementById('fullscreen-overlay');
        overlay.style.display = 'none';
        overlay.classList.remove('bomb-alert');
        isBombTriggered = false;
        updateStats();
        isOverlayOpen = false;
    }

    function resetGame() {
        if(confirm('確定要將所有卡牌重新洗牌嗎？')) {
            initializeDecks();
            isOverlayOpen = false;
            updateStats();
        }
    }
</script>
