<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>心動航線：從遠方到身邊</title>
    <style>
        :root {
            --bg-dark: #0a0a1a;
            --bg-light: #1a1a3a;
            --card-back-bg: linear-gradient(135deg, #111122 0%, #2a1b4d 100%);
            --lv1-glow: rgba(135, 206, 250, 0.6);
            --lv1-bg: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            --lv2-glow: rgba(255, 165, 0, 0.6);
            --lv2-bg: linear-gradient(135deg, #ffedd5 0%, #fed7aa 100%);
            --lv3-glow: rgba(220, 20, 60, 0.6);
            --lv3-bg: linear-gradient(135deg, #ffe4e6 0%, #fecdd3 100%);
        }
        
        * { 
            box-sizing: border-box; 
            font-family: 'PingFang TC', 'Microsoft JhengHei', serif; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }
        
        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-dark) 100%);
            color: #fff;
            overflow: hidden; 
            display: flex; flex-direction: column; height: 100vh;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        
        #setup-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; z-index: 200; position: absolute;
            background: inherit; text-align: center; padding: 20px;
        }
        .setup-title { font-size: 32px; color: #f8e5b4; margin-bottom: 10px; font-weight: 300; letter-spacing: 2px;}
        .setup-subtitle { font-size: 16px; color: #aaa; margin-bottom: 40px; }
        
        .file-input-wrapper { 
            margin-bottom: 40px; padding: 20px; width: 90%; max-width: 400px;
            transition: all 0.3s ease;
        }
        
        button {
            padding: 16px 40px; font-size: 18px; border: 1px solid #f8e5b4; border-radius: 30px;
            background: transparent; color: #f8e5b4; cursor: pointer; transition: 0.4s;
            letter-spacing: 1px;
        }
        button:hover, button:active { background: #f8e5b4; color: #0a0a1a; box-shadow: 0 0 15px rgba(248, 229, 180, 0.5); }

        #game-screen { display: none; height: 100vh; width: 100vw; position: relative; }
        
        #status-bar {
            position: absolute; top: max(20px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
            padding: 10px 25px; font-size: 15px; letter-spacing: 1px;
            color: #ddd; z-index: 10; white-space: nowrap;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        #deck-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            height: 80vh; cursor: pointer; animation: float 4s ease-in-out infinite;
        }
        .deck-visual {
            width: 55vw; max-width: 260px; aspect-ratio: 2 / 3; border-radius: 15px;
            border: 6px solid #e0e0e0; box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.8);
            background: var(--card-back-bg); background-size: cover; background-position: center;
            position: relative; transition: transform 0.2s;
        }
        .deck-visual::after, .deck-visual::before {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 15px; background-size: cover; background-position: center;
        }
        .deck-visual::after { top: 4px; left: 4px; border: 2px solid rgba(255,255,255,0.3); background: var(--card-back-bg); z-index: -1; }
        .deck-visual::before { top: 8px; left: 8px; border: 1px solid rgba(255,255,255,0.2); background: var(--card-back-bg); z-index: -2; }
        .deck-visual:active { transform: scale(0.95); }
        .click-hint { position: absolute; bottom: -50px; width: 100%; text-align: center; color: #aaa; font-size: 16px; letter-spacing: 2px;}

        /* 底層按鈕區（只保留重新洗牌） */
        #controls {
            position: absolute; bottom: 0; width: 100%;
            padding-bottom: max(30px, env(safe-area-inset-bottom)); 
            display: flex; justify-content: center; z-index: 10;
        }
        #controls button { padding: 12px 24px; font-size: 16px; }

        /* 全螢幕翻牌區 */
        #fullscreen-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 100; justify-content: center; align-items: center; flex-direction: column;
        }
        
        /* 修復後的上層按鈕（收起卡片） */
        #next-btn {
            display: none; 
            position: absolute; 
            bottom: max(40px, env(safe-area-inset-bottom)); /* 固定在最上方遮罩的底部 */
            background: #f8e5b4; 
            color: #0a0a1a; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(248, 229, 180, 0.3);
            z-index: 101; /* 確保在所有物件最上層 */
        }

        .card-wrapper {
            width: 85vw; max-width: 380px; aspect-ratio: 2.2 / 3.5;
            perspective: 1500px; cursor: pointer; margin-bottom: 20px;
        }
        .card-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d;
        }
        .card-wrapper.flipped .card-inner { transform: rotateY(180deg); }
        
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 20px; border: 8px solid #fdfdfd; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px;
        }
        
        .card-back { background: var(--card-back-bg); background-size: cover; background-position: center; box-shadow: 0 10px 40px rgba(255,255,255,0.1); }
        .card-front { transform: rotateY(180deg); color: #222; }
        
        .card-level { font-size: 14px; font-weight: bold; margin-bottom: 15px; padding: 6px 18px; border-radius: 20px; letter-spacing: 1px;}
        .card-title { font-size: 22px; font-weight: 800; margin-bottom: 25px; text-align: center;}
        .card-text { font-size: 18px; line-height: 1.6; text-align: left; font-weight: 600;}
        
        .lv1-front { background: var(--lv1-bg); box-shadow: 0 0 30px var(--lv1-glow); }
        .lv2-front { background: var(--lv2-bg); box-shadow: 0 0 30px var(--lv2-glow); }
        .lv3-front { background: var(--lv3-bg); box-shadow: 0 0 30px var(--lv3-glow); }
        
        .lv1-text { color: #0284c7; background: rgba(255,255,255,0.8); }
        .lv2-text { color: #c2410c; background: rgba(255,255,255,0.8); }
        .lv3-text { color: #be123c; background: rgba(255,255,255,0.8); }

        .overlay-hint { color: rgba(255,255,255,0.8); font-size: 16px; letter-spacing: 2px; }

        @media (min-width: 768px) {
            .setup-title { font-size: 48px; }
            .setup-subtitle { font-size: 20px; }
            .deck-visual { max-width: 340px; }
            .click-hint { font-size: 20px; bottom: -60px; }
            .card-wrapper { max-width: 500px; }
            .card-title { font-size: 30px; margin-bottom: 35px;}
            .card-text { font-size: 24px; line-height: 1.8; }
            .card-level { font-size: 18px; padding: 8px 24px;}
            button { padding: 18px 36px; font-size: 20px; }
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-title">心動航線</div>
        <div class="setup-subtitle">從遠方 到身邊</div>
        <div class="file-input-wrapper glass-panel">
            <label for="bg-upload" style="cursor:pointer; color:#f8e5b4; display:block; padding:10px;">
                <div style="font-size: 35px; margin-bottom: 15px;">✨</div>
                點擊此處上傳專屬照片作為卡背<br><span style="font-size: 13px; color:#aaa; display:block; margin-top:8px;">(若無上傳將使用午夜星空背景)</span>
            </label>
            <input type="file" id="bg-upload" accept="image/*" style="display:none" onchange="previewImage(event)">
        </div>
        <button onclick="startGame()">進入航線</button>
    </div>

    <div id="game-screen">
        <div id="status-bar" class="glass-panel">
            已探索: <span id="drawn-count" style="color:#f8e5b4; font-weight:bold; font-size:18px;">0</span> / 剩餘未知: <span id="remain-count">90</span>
        </div>

        <div id="deck-container" onclick="drawCard()">
            <div class="deck-visual" id="deck-visual-elem">
                <div class="click-hint">點擊抽取願望</div>
            </div>
        </div>

        <div id="controls">
            <button onclick="location.reload()" style="border-color: #555; color: #888;">重新洗牌</button>
        </div>
    </div>

    <div id="fullscreen-overlay">
        <div class="card-wrapper" id="active-card" onclick="flipCard()">
            <div class="card-inner">
                <div class="card-back" id="card-back-elem"></div>
                <div class="card-front" id="card-front-elem">
                    <div class="card-level" id="card-lv-text">Level</div>
                    <div class="card-title" id="card-title-text">標題</div>
                    <div class="card-text" id="card-desc-text">內容</div>
                </div>
            </div>
        </div>
        <div class="overlay-hint" id="overlay-hint">輕觸卡牌 翻開心跳</div>
        <button onclick="closeFullscreen()" id="next-btn">完成任務 / 收起卡片</button>
    </div>

        { lv: 3, title: '【終極願望｜禁地探索】', text: '請親吻我身上一個平常不會被親到的地方。' },
        { lv: 3, title: '【終極願望｜耳語挑逗】', text: '請在我耳邊描述一件，你待會想跟我一起在床上做的事。' },
        { lv: 3, title: '【終極願望｜絕對主導】', text: '接下來的 3 分鐘，我會完全聽從你的任何指令。請下令吧。' },
        { lv: 3, title: '【終極願望｜解開防備】', text: '請幫我解開一顆釦子（或拉下一點拉鍊）。' },
        { lv: 3, title: '【終極願望｜沙發霸氣】', text: '請把我壓在沙發上，近距離感受彼此的真實體溫。' },
        { lv: 3, title: '【終極願望｜頸部標記】', text: '請在我的脖子上留下一個溫熱的吻，持續 10 秒。' },
        { lv: 3, title: '【終極願望｜體溫滲透】', text: '請稍微解開我們的衣領，讓兩人的鎖骨或胸口肌膚輕輕貼合 20 秒。' },
        { lv: 3, title: '【終極願望｜盲測親吻】', text: '請蒙住你的眼，讓我親吻你，你要猜出我親了哪裡。' },
        { lv: 3, title: '【私密大哉問｜害羞幻想】', text: '遠距離時，你對我的什麼幻想最讓你害羞？請誠實告訴我。' },
        { lv: 3, title: '【終極願望｜感官挑逗】', text: '請輕輕親吻或輕咬我的耳垂與頸側。' },
        { lv: 3, title: '【終極願望｜呼吸交換】', text: '親吻前，請讓我們的嘴唇微張但不碰觸，交換彼此的呼吸 10 秒。' },
        { lv: 3, title: '【終極願望｜背部游走】', text: '請將雙手伸進我的衣服裡，輕撫我的背部。' },
        { lv: 3, title: '【私密大哉問｜曲線探索】', text: '誠實告訴我，你最喜歡我身上哪個部位的曲線？' },
        { lv: 3, title: '【終極願望｜腰線輕撫】', text: '請將雙手沿著我的腰線，慢慢上下游走。' },
        { lv: 3, title: '【終極願望｜敏感搜尋】', text: '請找出我身上最怕癢或最敏感的一個點。' },
        { lv: 3, title: '【終極願望｜咬唇挑逗】', text: '在我們親吻的過程中，請輕輕咬一下我的下唇。' },
        { lv: 3, title: '【終極願望｜換裝遊戲】', text: '請指定我換上（或脫下）一件衣物。' },
        { lv: 3, title: '【終極願望｜雙唇解鎖】', text: '請坐在我腿上，用你的嘴唇幫我脫掉一隻襪子。' },
        { lv: 3, title: '【終極願望｜身體素描】', text: '請用嘴唇當畫筆，在我的胸口或脖子上畫一個愛心。' },
        { lv: 3, title: '【終極願望｜低音誘惑】', text: '請用最沙啞性感的聲音，在我的耳邊叫我的名字。' },
        { lv: 3, title: '【終極願望｜腿部探索】', text: '請將手放在我的大腿上，慢慢向上輕撫。' },
        { lv: 3, title: '【終極願望｜吻的延伸】', text: '請從我的嘴角開始，一路親吻到我的鎖骨。' },
        { lv: 3, title: '【終極願望｜主控權交出】', text: '我現在宣告放棄抵抗，由你決定接下來 5 分鐘要對我做什麼。' },
        { lv: 3, title: '【終極願望｜氣息捕捉】', text: '請將頭埋在我的胸口，聽聽我因為你而加速的心跳。' },
        { lv: 3, title: '【私密大哉問｜大尺度秘密】', text: '說出一個你在我們視訊時，曾經想過但不敢說的親密要求。' },
        { lv: 3, title: '【終極願望｜身體紀念】', text: '請在我身上找一個你最愛的位子，留下一個紅印。' },
        { lv: 3, title: '【終極願望｜最終選擇】', text: '請現在就帶我去臥室，終止這場遊戲；或者，你可以選擇再抽一張 Lv3 繼續冒險。' }
    ];

    let deck = [...allCards].sort(() => Math.random() - 0.5);
    let drawnCount = 0;
    let isFlipped = false;

    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.documentElement.style.setProperty('--card-back-bg', `url('${e.target.result}')`);
                alert('專屬照片設定成功！');
            }
            reader.readAsDataURL(file);
        }
    }

    function updateStats() {
        document.getElementById('drawn-count').innerText = drawnCount;
        document.getElementById('remain-count').innerText = deck.length;
        if(deck.length === 0) {
            document.getElementById('deck-visual-elem').style.opacity = '0.3';
            document.querySelector('.click-hint').innerText = '航線已抵達終點';
        }
    }

    function startGame() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        updateStats();
    }

    function drawCard() {
        if (deck.length === 0) return alert('卡牌已經全部抽完囉！');
        
        const currentCard = deck.pop();
        drawnCount++;
        
        const frontElem = document.getElementById('card-front-elem');
        const lvText = document.getElementById('card-lv-text');
        
        frontElem.className = 'card-front'; 
        lvText.className = 'card-level';
        
        frontElem.classList.add(`lv${currentCard.lv}-front`);
        lvText.classList.add(`lv${currentCard.lv}-text`);
        lvText.innerText = `LEVEL ${currentCard.lv}`;
        
        document.getElementById('card-title-text').innerText = currentCard.title;
        document.getElementById('card-desc-text').innerText = currentCard.text;

        isFlipped = false;
        document.getElementById('active-card').classList.remove('flipped');
        document.getElementById('fullscreen-overlay').style.display = 'flex';
        document.getElementById('overlay-hint').style.display = 'block';
        document.getElementById('next-btn').style.display = 'none';
    }

    function flipCard() {
        if (!isFlipped) {
            document.getElementById('active-card').classList.add('flipped');
            document.getElementById('overlay-hint').style.display = 'none';
            setTimeout(() => {
                document.getElementById('next-btn').style.display = 'block';
            }, 800);
            isFlipped = true;
        }
    }

    function closeFullscreen() {
        document.getElementById('fullscreen-overlay').style.display = 'none';
        updateStats();
    }
</script>

</body>
</html>
